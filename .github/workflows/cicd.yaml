name: CICD (Staging, Prod)

on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md

  merge_group:
    types: [checks_requested]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  # Tests only in merge queue (preview merge includes prior queued PRs).
  build:
    if: github.event_name == 'merge_group'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  unit-test:
    if: github.event_name == 'merge_group'
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit

  staging-deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: staging
    secrets: inherit

  prod-approval-gate:
    needs: staging-deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: approved
        env: 
          ENV_NAME: prod
        run: write-host "Approve for $($env.ENV_NAME)"
    
  prod-deploy:
    needs: prod-approval-gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: prod
    secrets: inherit