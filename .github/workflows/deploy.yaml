name: Deploy

# Runs when a PR is merged into main — not on PR open/sync (those stay in CI).
on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  staging-deploy:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: staging
    secrets: inherit
  prod-approval-gate:
    needs: staging-deploy
    # REMOVED concurrency from here.
    # Now 30 runs can sit here waiting for a human at once.
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - run: echo "Waiting for human to click Approve..."

  prod-deploy:
    needs: prod-approval-gate
    # KEEP concurrency here.
    # Once approved, they will enter the "1 Running + 1 Pending" queue.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: prod
