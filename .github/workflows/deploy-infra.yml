name: "Deploy Infra"

on:
  # This is a reusable workflow
  workflow_call:
    inputs:
      environment:
        description: "Name of the environment to deploy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh
    
jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    steps:
      - env:
          TARGET_ENV: ${{ inputs.environment }}
        run: echo "DEPLOYING THE INFRASTRUCTURE to $env:TARGET_ENV..."